# ClassRelation Configuration File
# This file can be placed in:
# 1. Current directory (./classrelation.properties)
# 2. Specified via -Dconfig.path=/path/to/classrelation.properties
# 3. Classpath (src/main/resources/classrelation.properties)

# ============================================================================
# Project Settings
# ============================================================================

# Path to the Java project to analyze (required)
# Can be absolute or relative path
project.path=/home/linux_zeng/projects/classRelationTestCode

# ============================================================================
# Package Filter Settings
# ============================================================================

# Comma-separated list of package patterns to include in analysis
# Supports:
#   - Exact match: com.example.model
#   - One-level wildcard: com.example.* (matches com.example.model, com.example.dto)
#   - Sub-package match: com.example.** (matches all sub-packages)
# Leave empty to analyze all packages
package.filters=org.example.**

# Comma-separated list of package patterns to exclude from field mappings.
# Any mapping where the source or target field's declaring class (by simple name)
# belongs to an excluded package is dropped.
# Same pattern syntax as package.filters: exact, .*, .**
# Leave empty to exclude nothing
package.excludes=org.example.exclude.**

# Strict mode: only include relations where BOTH source and target are in target packages
# false (default): include if at least one side matches (OR logic)
# true: include only if both sides match (AND logic)
package.strict.mode=false

# ============================================================================
# Output Settings
# ============================================================================

# Directory to write output files
# Defaults to the current working directory
output.dir=.

# Enable/disable each output format independently
output.markdown.enabled=true
output.html.enabled=true
output.nebula.enabled=false

# ============================================================================
# Graph Rendering Settings
# ============================================================================

# Maximum number of connected components to render in the HTML graph
# 0 (default): render all components
# >0: render only the top N components with most edges
graph.max.components.to.render=5
